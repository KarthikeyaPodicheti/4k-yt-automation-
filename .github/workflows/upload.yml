name: 🎬 4K Edits YouTube Automation

on:
  schedule:
    # 10:00 AM IST = 04:30 AM UTC
    # 06:00 PM IST = 12:30 PM UTC
    - cron: '30 4,12 * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Run Upload Automation
        env:
          TOKEN_PICKLE_BASE64: ${{ secrets.TOKEN_PICKLE_BASE64 }}
          SERVICE_ACCOUNT_BASE64: ${{ secrets.SERVICE_ACCOUNT_BASE64 }}
        run: python upload_scheduled.py

      - name: 💾 Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add processed_videos.json upload_history.json daily_upload_count.json
          git commit -m "📊 Auto-update state and logs [skip ci]" || echo "No changes to commit"
          git push
